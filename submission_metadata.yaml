# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local PC"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.10.11"
  os: "Windows 11"
  uses_gpu_for_inference: false                 # Must be false
  has_network_during_ranking: false             # Must be false
  pre_computation_required: true                # true (using offline sentence-transformer embeddings)
  pre_computation_time_minutes: 13              # Approx 12.3 minutes offline

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini (Antigravity AI agent) for pair programming, refining candidate filters (L0/L1/L2), optimizing the tie-breaker sorted list, and ensuring strict adherence to the Job Description.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Multi-layered ranking pipeline consisting of precomputed MiniLM embeddings for semantic similarity, combined with strict heuristics derived from the job description. Hard L0 filters scrub honeypots, pure research (lacking production terms), and CV/Speech/Robotics only (lacking NLP/IR). L1 applies person-job fit scoring via embeddings similarity, tenure stability, and consulting firm penalties. L2 calibrates scores using notice period boosts, recruiter response rates, and platform inactivity penalties. L3 implements tone-consistent, factual, and hallucination-free reasoning justification with stylistic variation.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
